name: CI

on:
  push:
    branches:
      - master
      - main
      - 'release/**'
  pull_request:
    branches:
      - master
      - main
      - 'release/**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Validate vendor
        run: |
          ./hack/validate/vendor

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.57
          args: --timeout=10m

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests
        run: |
          hack/test/unit
        env:
          TESTFLAGS: "-v --timeout=10m"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - windows/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binary
        run: |
          PLATFORM=${{ matrix.platform }}
          OS=${PLATFORM%%/*}
          ARCH=${PLATFORM##*/}
          GOARCH=${ARCH/\//-}
          GOOS=$OS GOARCH=$GOARCH go build ./cmd/dockerd
        shell: bash

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-22.04
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests
        run: |
          make test-integration
        env:
          TEST_SKIP_FLAKY: "true"
